<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bus Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <h2>Smart Bus System</h2>

        <form onsubmit="return loginUser()">

            <div class="input-group">
                <label for="userType">User Type</label>
                <select id="userType" onchange="showBusOption()" required>
                    <option value="">Select</option>
                    <option value="admin">Admin</option>
                    <option value="driver">Driver</option>
                    <option value="student">Student</option>
                </select>
            </div>

            <!-- BUS SELECTION -->
            <div class="input-group" id="busGroup" style="display:none;">
                <label for="busNumber">Select Bus</label>
                <select id="busNumber">
                    <option value="">Select Bus</option>
                    <option value="1">Bus 1</option>
                    <option value="2">Bus 2</option>
                    <option value="3">Bus 3</option>
                    <option value="4">Bus 4</option>
                    <option value="5">Bus 5</option>
                </select>
            </div>

            <div class="input-group">
                <label for="userId">ID</label>
                <input type="text" id="userId" placeholder="Enter ID" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>

            <button type="submit">Login</button>

        </form>

        <p id="error-msg"></p>
    </div>
</div>

<script src="login.js"></script>

<script>
function showBusOption() {
    let userType = document.getElementById("userType").value;
    let busGroup = document.getElementById("busGroup");

    if (userType === "student" || userType === "driver") {
        busGroup.style.display = "block";
    } else {
        busGroup.style.display = "none";
    }
}
</script>

</body>
</html>
